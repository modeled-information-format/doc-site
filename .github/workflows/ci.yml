name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # SCA: OSV-Scanner + dependency-review, as a thin caller of the org central
  # reusable (consume, never reinvent).
  sca:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    uses: modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@f83ee8058630235396f7242580570b26cf3617fa
    with:
      fail-on-severity: high

  # SAST: CodeQL, as a thin caller of the org central reusable (consume,
  # never reinvent). No GitHub-native "default setup" was configured for this
  # repo; this workflow-based call is the org's standard instead.
  sast:
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    uses: modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@f83ee8058630235396f7242580570b26cf3617fa
    with:
      languages: 'javascript-typescript,actions'

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (validates the Starlight site + all internal links)
        run: npm run build
